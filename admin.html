<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Автосервис "Мотор-Техно"</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 2rem;
        }
        .admin-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-to-site {
            color: var(--accent);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-to-site:hover {
            background: var(--accent);
            color: white;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            border: var(--glass-border);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .admin-table {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 1rem;
            border: var(--glass-border);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: var(--accent);
        }
        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            margin: 0 4px;
        }
        .edit-btn {
            background: #fdcb6e;
            color: #333;
        }
        .delete-btn {
            background: #ff7675;
            color: white;
        }
        .add-btn {
            background: #00b894;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .search-input {
            padding: 10px 15px;
            border-radius: 30px;
            border: var(--glass-border);
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            max-width: 300px;
        }
        .tab-btn {
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 1rem;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-window {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            border: var(--glass-border);
        }
        .modal-window input, .modal-window select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: var(--glass-border);
            background: var(--bg-primary);
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        .modal-window label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Админ-панель</h1>
            <a href="index.html" class="back-to-site" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти и на сайт</a>
        </div>
        <div id="adminContent"></div>
    </div>
    <script type="module" src="js/adminPage.js"></script>
</body>
</html>
